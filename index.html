<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talents 4 CRM v6</title>
<style>
:root {
  --bg:#070b14; --panel:#0f1523; --panel2:#121a2b; --line:#1d2740; --txt:#e7ecff; --muted:#98a3c7;
  --blue:#54b4ff; --green:#24d39a; --yellow:#f3c969; --red:#ff667f; --purple:#b68cff; --teal:#35d2cf;
  --radius:14px; --shadow:0 10px 30px rgba(0,0,0,.25);
}
* { box-sizing:border-box; }
body { margin:0; background:linear-gradient(180deg,#060912,#090f1d 30%,#0a1120); color:var(--txt); font:14px/1.4 Inter,Segoe UI,Arial,sans-serif; }
.app { display:grid; grid-template-columns:280px 1fr; min-height:100vh; }
.sidebar { border-right:1px solid var(--line); padding:18px 14px; background:rgba(5,8,16,.8); }
.brand { font-weight:800; font-size:22px; display:flex; gap:10px; align-items:center; margin-bottom:24px; }
.brand-badge { width:38px; height:38px; border-radius:12px; display:grid; place-items:center; background:#5b6af0; }
.nav button { width:100%; text-align:left; margin:0 0 8px; padding:12px 14px; border-radius:12px; border:1px solid var(--line); background:var(--panel); color:var(--txt); cursor:pointer; }
.nav button.active { border-color:#5b6af0; background:#131d35; }
.main { padding:18px; }
.topbar { display:flex; gap:10px; align-items:center; justify-content:space-between; margin-bottom:16px; }
.search { flex:1; max-width:440px; }
input, select, textarea, button { font:inherit; }
input, select, textarea { width:100%; background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:12px; padding:10px 12px; }
button.primary { background:#5b6af0; color:white; border:none; padding:10px 14px; border-radius:12px; cursor:pointer; }
.grid-cards { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:14px; }
.card { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; }
.kpi-title { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em; }
.kpi-val { font-size:34px; font-weight:800; margin-top:10px; }
.grid-2 { display:grid; grid-template-columns:1.2fr .8fr; gap:14px; margin-top:14px; }
.filters { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:10px; margin:14px 0; }
.tablewrap { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); overflow:auto; }
table { width:100%; border-collapse:collapse; }
th, td { padding:10px 12px; border-bottom:1px solid var(--line); white-space:nowrap; vertical-align:top; }
th { position:sticky; top:0; background:#10192d; text-align:left; font-size:12px; color:var(--muted); text-transform:uppercase; }
tr:hover td { background:#0f1930; cursor:pointer; }
.badge { display:inline-block; padding:3px 8px; border-radius:999px; font-size:12px; border:1px solid var(--line); }
.rowbars .bar { display:grid; grid-template-columns:160px 1fr 42px; gap:10px; align-items:center; margin:8px 0; }
.rowbars .track { height:10px; background:#09101d; border-radius:999px; overflow:hidden; border:1px solid var(--line); }
.rowbars .fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--purple)); }
.modalbg { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; padding:20px; }
.modalbg.open { display:flex; }
.modal { width:min(980px,96vw); max-height:92vh; overflow:auto; background:#0b1220; border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); }
.modal header { display:flex; justify-content:space-between; align-items:center; padding:16px 18px; border-bottom:1px solid var(--line); position:sticky; top:0; background:#0b1220; }
.formgrid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; padding:16px 18px 20px; }
.formgrid .full { grid-column:1/-1; }
.section { grid-column:1/-1; color:var(--blue); font-weight:700; text-transform:uppercase; font-size:12px; letter-spacing:.08em; margin-top:10px; }
.muted { color:var(--muted); }
.small { font-size:12px; }
.setting-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.listbox { max-height:240px; overflow:auto; background:#09101d; border:1px solid var(--line); border-radius:12px; padding:10px; }
@media (max-width: 1200px) { .grid-cards { grid-template-columns:repeat(3,1fr); } .filters { grid-template-columns:repeat(3,1fr); } .formgrid { grid-template-columns:repeat(2,1fr); } }
@media (max-width: 900px) { .app { grid-template-columns:1fr; } .sidebar { display:none; } .grid-cards, .filters, .grid-2, .setting-grid, .formgrid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="brand-badge">T4</div><div>Talents 4<div class="small muted">CRM v6</div></div></div>
    <div class="nav">
      <button class="active" data-view="dashboard" onclick="setView('dashboard',this)">Dashboard</button>
      <button data-view="candidates" onclick="setView('candidates',this)">Candidatos</button>
      <button data-view="settings" onclick="setView('settings',this)">Configurações</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div>
        <div style="font-size:24px;font-weight:800" id="title">Dashboard</div>
        <div class="muted small" id="status">aguardando conexão</div>
      </div>
      <div class="search"><input id="globalSearch" placeholder="Buscar por nome, cidade, profissão, avaliador..." oninput="applyFilters()"></div>
      <button class="primary" onclick="openCandidate()">+ Novo candidato</button>
    </div>
    <div id="content"></div>
  </main>
</div>

<div class="modalbg" id="candModalBg">
  <div class="modal">
    <header>
      <div><div style="font-size:20px;font-weight:800" id="candTitle">Candidato</div><div class="small muted" id="candMeta"></div></div>
      <div style="display:flex;gap:8px"><button onclick="closeModal()">Fechar</button><button class="primary" onclick="saveCandidate()">Salvar</button></div>
    </header>
    <div class="formgrid" id="candForm"></div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbx54xgjpP4djSleqpjXHfzHXfsxyhVuc7gqZsJJqWX9nUUi9G6hGymBA6I8ONT5LEjL/exec';
const API_KEY = 'bed530fb36824844bfb274ff4cf34b7e640e7cdc';

const S = {
  view:'dashboard',
  schema:[],
  enums:{},
  dashboard:{},
  candidates:[],
  users:[],
  filtered:[],
  current:null,
  filter:{status:'',perfil:'',alemao:'',profissao:'',ativo:''}
};

const GROUPS = {
  'Identificação / base': ['ID','ID legado','Nome completo','Ativo','STATUS PIPELINE','Substatus','Status Final','Data entrada etapa atual','Responsável interno','Prioridade comercial','Nível de risco'],
  'Contato / perfil': ['E-mail','Telefone','País de origem','Cidade atual','Idade','Estado civil','Filho','Idade filho','Profissão do cônjuge','Profissão principal','Área profissional','Universidade','Curso de Graduação','Pós-graduação','Curso','Referência','Resumo profissional'],
  'Idioma e avaliação': ['Nível de alemão','Em curso de alemão','Língua Estrangeira','Nível Língua Estrangeira','Resultado da prova','Avaliador','Resultado da entrevista','Perfil','Tipo de candidato','Análise do recrutador','Diferenciais do perfil','Pontos fortes','Pontos de atenção','Perfil profissional para apresentação','Observações internas','Observação'],
  'Entrevista detalhada': ['Data da Entrevista','Quem é você?','Com quem você mora?','Porque deseja ir para Alemanha, como surgiu o interesse?','Relato sobre a experiência profissional','Trace um breve histórico da sua vida profissional até o último trabalho (onde, quanto tempo ficou, se foi promovido, atividades que desenvolveu, porque saiu)','Quais desafios você imagina enfrentar ao ficar 1 ano sem a companhia da sua família e como acredita que lidaria com a adaptação, a saudade e a construção de novas relações nesse período?','Como é sua organização financeira?\nTem reserva?\nComo será o preparo para Alemanha?','Como é seu preparo para acompanhar as aulas?\n Velocidade da internet, computador, disponibilidade total de tempo, ambiente adequado?','Acredita que pode contribuir de que forma para os instituições na alemãs? Como e por que?','Área de interesse','Como você organiza seu dia a dia?','Conte-me sobre uma situação imprevista que você teve que administrar na sua função e como se saiu','Conte-me uma situação em que você rejeitou uma mudança imposta por seu superior imediato.','Quando você começou a estabelecer metas na sua vida pessoal?','Qual a coisa mais importante que você acha que fez por você mesmo?','Você já precisou liderar alguém ou grupo de pessoas?','Na sua opinião, quais as principais características que uma pessoa deve ter para ocupar este cargo?','Link da Gravação da Entrevista'],
  'Documentação / jurídico': ['CV/ ARQUIVO DOC','Foto de rosto','Carteira de vacinação','CPF','Comprovante de residência','Documento Profissional (COREN, CRM, CREA, outro)','Número do Passaporte','Validade do passaporte','Cidadania Europeia','Diploma','Histórico','Em caso de mudança de nome no diploma','Certificação estrangeira','Arquivo','Documentação completa','Pendência documental crítica','Deliberação do RH','Data do envio do contrato','Data do envio do termo de uso de imagens','Termo de consentimento de uso de dados','Contrato','Retorno'],
  'Employer / saída': ['Elegível para employer','Hospital alvo','Status employer','Data envio employer','Retorno employer','Data início curso alemão','Data prevista mudança','Motivo inativação','Data inativação','Etapa de saída','Reativável','Observação final de saída','Data da desistência','Motivo da desistência','Etapa da desistência','Data do Não qualificado','Motivo do Não qualificado','Etapa do Não qualificado','Criado Em','Última atualização','Atualizado Por']
};

async function apiGet(route, params={}) {
  const url = new URL(API_URL);
  url.searchParams.set('route', route);
  url.searchParams.set('key', API_KEY);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const r = await fetch(url.toString(), { cache:'no-store' });
  const d = await r.json();
  if (!r.ok || !d.ok) throw new Error(d.error || ('HTTP ' + r.status));
  return d;
}
async function apiPost(action, payload={}) {
  const r = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(Object.assign({ action, key: API_KEY }, payload))
  });
  const d = await r.json();
  if (!r.ok || !d.ok) throw new Error(d.error || ('HTTP ' + r.status));
  return d;
}

async function init() {
  try {
    const s = await apiGet('schema');
    const c = await apiGet('candidates');
    S.schema = s.schema || [];
    S.enums = s.enums || {};
    S.dashboard = s.dashboard || {};
    S.users = s.users || [];
    S.candidates = c.candidates || [];
    S.filtered = S.candidates.slice();
    document.getElementById('status').textContent = `${S.candidates.length} candidatos carregados`;
    render();
  } catch (e) {
    document.getElementById('status').textContent = 'erro: ' + e.message;
    document.getElementById('content').innerHTML = `<div class="card"><b>Falha de conexão.</b><div class="small muted" style="margin-top:8px">${e.message}</div><div class="small muted" style="margin-top:8px">Verifique API_URL, API_KEY e se o Web App foi publicado como acesso público.</div></div>`;
  }
}

function setView(view, el) {
  S.view = view;
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('title').textContent = view === 'dashboard' ? 'Dashboard' : view === 'candidates' ? 'Candidatos' : 'Configurações';
  render();
}

function render() {
  if (S.view === 'dashboard') return renderDashboard();
  if (S.view === 'candidates') return renderCandidates();
  return renderSettings();
}

function card(title, value, hint='') {
  return `<div class="card"><div class="kpi-title">${title}</div><div class="kpi-val">${value}</div><div class="small muted">${hint}</div></div>`;
}

function renderDashboard() {
  const d = S.dashboard || {};
  const content = `
    <div class="grid-cards">
      ${card('Total cadastrados', d.total || 0, 'base consolidada')}
      ${card('Ativos', d.ativos || 0, 'pipeline aberto')}
      ${card('B1+', d.b1plus || 0, 'prontos de idioma')}
      ${card('Aprovados / Prontos', d.aprovados || 0, 'aguardando vaga')}
      ${card('Contratados', d.contratados || 0, 'fechados')}
    </div>
    <div class="grid-2">
      <div class="card"><div class="kpi-title">Pipeline</div><div class="rowbars">${barsFromObject(d.porPipeline || {})}</div></div>
      <div class="card"><div class="kpi-title">Perfis</div><div class="rowbars">${barsFromObject(d.porPerfil || {})}</div></div>
    </div>
    <div class="grid-2">
      <div class="card"><div class="kpi-title">Profissões</div><div class="rowbars">${barsFromObject(d.porProfissao || {}, 10)}</div></div>
      <div class="card"><div class="kpi-title">Nível de alemão</div><div class="rowbars">${barsFromObject(d.porAlemao || {})}</div></div>
    </div>`;
  document.getElementById('content').innerHTML = content;
}

function barsFromObject(obj, limit=8) {
  const arr = Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,limit);
  const max = Math.max(1, ...arr.map(x=>x[1]));
  return arr.map(([k,v]) => `<div class="bar"><div class="small">${escapeHtml(k || 'N/A')}</div><div class="track"><div class="fill" style="width:${(v/max*100).toFixed(0)}%"></div></div><div class="small" style="text-align:right">${v}</div></div>`).join('') || '<div class="small muted">Sem dados.</div>';
}

function renderCandidates() {
  applyFilters();
  const profs = optionsFor('Profissão principal');
  const html = `
    <div class="filters">
      <input placeholder="Busca livre" value="${escapeAttr(document.getElementById('globalSearch').value || '')}" oninput="document.getElementById('globalSearch').value=this.value;applyFilters()">
      ${selectFilter('status', 'STATUS PIPELINE', optionsFor('STATUS PIPELINE'))}
      ${selectFilter('perfil', 'Perfil', optionsFor('Perfil'))}
      ${selectFilter('alemao', 'Nível de alemão', optionsFor('Nível de alemão'))}
      ${selectFilter('profissao', 'Profissão principal', profs)}
      ${selectFilter('ativo', 'Ativo', optionsFor('Ativo'))}
    </div>
    <div class="tablewrap">
      <table>
        <thead><tr><th>Nome</th><th>Status</th><th>Profissão</th><th>Alemão</th><th>Perfil</th><th>Avaliador</th><th>Cidade</th><th>ID</th></tr></thead>
        <tbody>
          ${S.filtered.map(c => `<tr onclick="openCandidate('${escapeJs(c.ID||'')}')">
            <td>${escapeHtml(c['Nome completo']||'')}</td>
            <td><span class="badge">${escapeHtml(c['STATUS PIPELINE']||'')}</span></td>
            <td>${escapeHtml(c['Profissão principal']||'')}</td>
            <td>${escapeHtml(c['Nível de alemão']||'')}</td>
            <td>${escapeHtml(c['Perfil']||'')}</td>
            <td>${escapeHtml(c['Avaliador']||'')}</td>
            <td>${escapeHtml(c['Cidade atual']||'')}</td>
            <td class="small muted">${escapeHtml(c.ID||'')}</td>
          </tr>`).join('') || '<tr><td colspan="8" class="small muted">Nenhum resultado.</td></tr>'}
        </tbody>
      </table>
    </div>`;
  document.getElementById('content').innerHTML = html;
}

function renderSettings() {
  const enumFields = Object.keys(S.enums).sort();
  const html = `
    <div class="setting-grid">
      <div class="card">
        <div class="kpi-title">Profissões cadastradas</div>
        <div class="listbox">${(S.enums['Profissão principal']||[]).map(v => `<div>${escapeHtml(v)}</div>`).join('') || '<div class="small muted">Sem dados</div>'}</div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <input id="newProf" placeholder="Nova profissão">
          <button class="primary" onclick="addEnum('Profissão principal', document.getElementById('newProf').value)">Adicionar</button>
        </div>
      </div>
      <div class="card">
        <div class="kpi-title">Usuários</div>
        <div class="listbox">${(S.users||[]).map(u => `<div>${escapeHtml(u.nome)} <span class="small muted">(${escapeHtml(u.user)} • ${escapeHtml(u.role)})</span></div>`).join('') || '<div class="small muted">Sem usuários</div>'}</div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px">
          <input id="uNome" placeholder="Nome">
          <input id="uLogin" placeholder="Login">
          <input id="uPass" placeholder="Senha">
          <select id="uRole"><option value="admin">Administrador</option><option value="recrutador">Recrutador</option><option value="viewer">Visualizador</option></select>
        </div>
        <button class="primary" style="margin-top:10px" onclick="saveUser()">Salvar usuário</button>
      </div>
    </div>
    <div class="card" style="margin-top:14px">
      <div class="kpi-title">Campos selecionáveis</div>
      <div class="listbox">${enumFields.map(f => `<div><b>${escapeHtml(f)}</b><div class="small muted">${(S.enums[f]||[]).length} opções</div></div>`).join('')}</div>
    </div>`;
  document.getElementById('content').innerHTML = html;
}

function optionsFor(field) {
  return (S.enums[field] || []).slice().sort((a,b)=>String(a).localeCompare(String(b),'pt-BR'));
}

function selectFilter(key, placeholder, options) {
  return `<select onchange="S.filter['${key}']=this.value;applyFilters()">
    <option value="">${placeholder}</option>
    ${options.map(o => `<option value="${escapeAttr(o)}" ${S.filter[key]===o?'selected':''}>${escapeHtml(o)}</option>`).join('')}
  </select>`;
}

function applyFilters() {
  const q = (document.getElementById('globalSearch').value || '').trim().toLowerCase();
  S.filtered = S.candidates.filter(c => {
    if (S.filter.status && c['STATUS PIPELINE'] !== S.filter.status) return false;
    if (S.filter.perfil && c['Perfil'] !== S.filter.perfil) return false;
    if (S.filter.alemao && c['Nível de alemão'] !== S.filter.alemao) return false;
    if (S.filter.profissao && c['Profissão principal'] !== S.filter.profissao) return false;
    if (S.filter.ativo && c['Ativo'] !== S.filter.ativo) return false;
    if (!q) return true;
    const blob = [c['Nome completo'], c['Cidade atual'], c['Profissão principal'], c['Avaliador'], c.ID, c['Resumo profissional']].join(' ').toLowerCase();
    return blob.includes(q);
  });
  if (S.view === 'candidates') renderCandidates();
}

function openCandidate(id='') {
  S.current = id ? (S.candidates.find(x => x.ID === id) || {}) : { 'Ativo':'SIM', 'STATUS PIPELINE':'Triagem' };
  document.getElementById('candTitle').textContent = S.current['Nome completo'] || 'Novo candidato';
  document.getElementById('candMeta').textContent = S.current.ID || 'novo registro';
  const form = document.getElementById('candForm');
  form.innerHTML = '';
  Object.entries(GROUPS).forEach(([group, fields]) => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.textContent = group;
    form.appendChild(sec);
    fields.forEach(field => {
      if (!S.schema.find(x => x.key === field)) return;
      const wrap = document.createElement('div');
      wrap.className = ['Resumo profissional','Quem é você?','Análise do recrutador','Pontos fortes','Pontos de atenção','Perfil profissional para apresentação','Observações internas','Observação'].includes(field) ? 'full' : '';
      const label = document.createElement('div');
      label.className = 'small muted';
      label.textContent = field;
      wrap.appendChild(label);
      const opts = S.enums[field] || [];
      let el;
      if (opts.length) {
        const sel = document.createElement('select');
        sel.innerHTML = `<option value=""></option>` + opts.map(o => `<option value="${escapeAttr(o)}">${escapeHtml(o)}</option>`).join('');
        sel.value = S.current[field] || '';
        sel.onchange = () => S.current[field] = sel.value;
        el = sel;
      } else if (['Resumo profissional','Quem é você?','Análise do recrutador','Pontos fortes','Pontos de atenção','Perfil profissional para apresentação','Observações internas','Observação','Trace um breve histórico da sua vida profissional até o último trabalho (onde, quanto tempo ficou, se foi promovido, atividades que desenvolveu, porque saiu)','Relato sobre a experiência profissional'].includes(field)) {
        const ta = document.createElement('textarea');
        ta.rows = 4;
        ta.value = S.current[field] || '';
        ta.oninput = () => S.current[field] = ta.value;
        el = ta;
      } else {
        const inp = document.createElement('input');
        inp.value = S.current[field] || '';
        inp.oninput = () => S.current[field] = inp.value;
        el = inp;
      }
      wrap.appendChild(el);
      form.appendChild(wrap);
    });
  });
  document.getElementById('candModalBg').classList.add('open');
}

function closeModal() {
  document.getElementById('candModalBg').classList.remove('open');
}

async function saveCandidate() {
  try {
    const r = await apiPost('saveCandidate', { candidate: S.current });
    const saved = r.candidate;
    const idx = S.candidates.findIndex(x => x.ID === saved.ID);
    if (idx >= 0) S.candidates[idx] = saved; else S.candidates.unshift(saved);
    closeModal();
    const dash = await apiGet('dashboard');
    S.dashboard = dash.dashboard || {};
    applyFilters();
    render();
    alert('Salvo com sucesso.');
  } catch (e) {
    alert('Erro ao salvar: ' + e.message);
  }
}

async function addEnum(field, value) {
  value = (value || '').trim();
  if (!value) return;
  try {
    const r = await apiPost('upsertEnum', { field, value });
    S.enums = r.enums || S.enums;
    render();
    alert('Opção adicionada.');
  } catch (e) {
    alert('Erro ao adicionar opção: ' + e.message);
  }
}

async function saveUser() {
  const user = {
    nome: document.getElementById('uNome').value.trim(),
    user: document.getElementById('uLogin').value.trim(),
    pass: document.getElementById('uPass').value.trim(),
    role: document.getElementById('uRole').value
  };
  if (!user.nome || !user.user || !user.pass) return alert('Preencha nome, login e senha.');
  try {
    const r = await apiPost('saveUser', { user });
    S.users = r.users || [];
    render();
    alert('Usuário salvo.');
  } catch (e) {
    alert('Erro ao salvar usuário: ' + e.message);
  }
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function escapeAttr(s) { return escapeHtml(s).replace(/'/g, '&#39;'); }
function escapeJs(s) { return String(s ?? '').replace(/\/g,'\\').replace(/'/g,"\\'"); }

init();
</script>
</body>
</html>
